<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWDORG Foundation - Media & Social</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/scss/style.css" />
</head>

<body>
    <section class="internet-section">
        <div id="header"></div>
        <div class="internet-hero-section"></div>

        <div class="internet-main-card">
            <div class="container pt-5">
                <!-- Media/Social content -->
                <div class="twitter-container">
                    <blockquote class="twitter-tweet">
                        <a href="https://twitter.com/AWDORG/status/1234567890"></a>
                    </blockquote>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <!-- Twitter Embed Script -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/include.js"></script>
</body>

</html>
